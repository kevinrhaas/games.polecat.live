<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Down the Rabbit Hole — games.polecat.live</title>
  <meta name="theme-color" content="#0b0420" />
  <link rel="icon" href="../../assets/logo.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/site.css" />
  <link rel="stylesheet" href="../../css/game.css" />
  <style id="game-theme">:root{--g-bg1:#2a0f4a;--g-bg2:#07021a;--g-bar:rgba(18,8,40,.95);--g-accent:#3ad6ff;--g-title:#ffd6f0;--g-panel:rgba(30,14,56,.82);--g-border:#5a3a8a;--g-text:#b59ad6;--g-key:#ff8ad0;--g-stage:#5a3a8a;--g-glow:rgba(58,214,255,.28)}</style>
</head>
<body class="game-page">
  <div class="game-bar">
    <a class="back" href="../../index.html">◀ ARCADE</a>
    <span class="title">Down the Rabbit Hole</span>
    <span class="src">· Alice in Wonderland</span>
    <span class="spacer"></span>
    <button class="icon-btn" id="fullscreenBtn" title="Full screen">⛶</button>
    <button class="icon-btn" id="muteBtn" title="Mute">🔊</button>
    <button class="icon-btn" id="restartBtn" title="Restart">↻</button>
  </div>
  <div class="game-main">
    <div id="game"></div>
    <div class="game-help">
      <b>Alice</b> tumbles down the endless hole. Steer through the gaps! Sip <b>DRINK ME (▾ blue)</b> to shrink through tight spots, eat <b>EAT ME (▴ pink)</b> to grow and smash through. Grab golden keys!
      <span class="keys">MOVE: ◀ ▶ / A D · or the on-screen pad</span>
    </div>
  </div>
  <script src="../../js/retro-engine.js"></script>
  <script src="game.js"></script>
</body>
</html>
