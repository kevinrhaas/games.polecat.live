name: Deploy to GitHub Pages

# Publishes the static arcade to GitHub Pages.
#  - on every push to main (so each new game the build-loop lands goes live)
#  - hourly on a schedule as a backstop
#  - manually via the Actions tab
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'   # top of every hour (UTC)
  workflow_dispatch:

# Least-privilege token + the scopes Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity-check every JS file parses
        run: |
          set -e
          shopt -s nullglob
          for f in js/*.js games/*/game.js; do
            echo "checking $f"
            node --check "$f"
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Try to turn Pages on automatically the first time this runs.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
