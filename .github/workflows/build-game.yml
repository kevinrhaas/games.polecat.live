name: Hourly Game Build

# Self-driving build loop: every hour, Claude builds the next game (or improves
# the site), commits it, and the workflow pushes to main — which triggers the
# Pages deploy. Needs a repo secret with Claude credentials (see below).
#
#   Settings → Secrets and variables → Actions → New repository secret
#   Add ONE of:
#     CLAUDE_CODE_OAUTH_TOKEN   (from `claude setup-token` — a Claude subscription)
#     ANTHROPIC_API_KEY         (an Anthropic API key)
#
# Dial the cadence with the cron below, or the model/turns under claude_args.

on:
  schedule:
    - cron: '23 * * * *'   # hourly, off the :00 mark
  workflow_dispatch:        # run on demand from the Actions tab

permissions:
  contents: write
  id-token: write       # the action mints its GitHub token via OIDC
  pull-requests: write

concurrency:
  group: build-game
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright + Chromium (for tests & thumbnails)
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Configure git
        run: |
          git config user.name "polecat-bot"
          git config user.email "bot@users.noreply.github.com"

      - name: Build one game with Claude
        uses: anthropics/claude-code-action@v1
        with:
          # Use the workflow's own token for GitHub ops (avoids the OIDC path).
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Provide either Claude secret; the empty one is ignored.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the autonomous hourly builder for the games.polecat.live arcade.
            Read CLAUDE.md and BUILD_LOOP.md first, then do ONE high-quality unit of work:

            FIRST PRIORITY: if any legacy single-mechanic game remains (catalog
            entries with legacy:true — alice, oz, frankenstein), upgrade ONE of
            them to a full multi-chapter story game (keep its good bits, e.g.
            Alice's falling mechanic) and DROP its legacy:true flag in the catalog
            so it appears on the home page.

            REBUILD QUEUE: roughly one run in three (when no legacy game is left),
            instead of a new game, take the TOP entry of REBUILD_QUEUE.md and REBUILD
            that game as the target genre/structure listed — a genuine GENRE SHIFT
            (new verbs, varied structure/opening per "Variety is the job"), NOT a
            reskin. Re-shoot its thumbnail, and DELETE that line from REBUILD_QUEUE.md
            in the same commit. These are the arcade's most repetitive games; fixing
            them is as valuable as a new title.

            GENERATIONS follow real console history: 8-bit = Gen 3 (NES), 16-bit =
            Gen 4 (SNES/Genesis), 3D = Gen 5 (future). New 8-bit games are Gen 3.
            NORTH STAR: every property should have BOTH a Gen-3 (8-bit) and a
            Gen-4 (16-bit) version — coexisting, grouped into one home card via a
            shared catalog `property` key. A Gen-4 is ADDITIVE, never a
            replacement. Roughly one run in five (when no legacy game is left),
            ADD a marquee property's Gen-4 version: create a NEW folder
            games/<id>-16/ (leave the 8-bit folder intact), a NEW catalog entry
            { id:"<id>-16", style:"16-bit", gen:4, property:"<Property>" }, and set
            that SAME property key on the existing 8-bit entry. Build its game.js
            on RetroSaga2 (js/saga2.js) + RetroGfx2 (js/retro-gfx2.js, api.g2),
            keeping its best mechanics but making it richer than 5 flat chapters —
            a hub map (nodes unlock via needs:[ids], an optional side-node), each
            node escalating phases ending in a mini-boss, persistent upgrades +
            banked currency, a branching choice, and multiple endings. It must
            LOOK like a real SNES/Genesis game — NOT "8-bit with gradients":
            supply an ANIMATED title via renderBoot(api,info) (a gleaming logo
            with g2.gleamText, a parallax multi-layer scene, particles via
            g2.stars/g2.embers/g2.fog, flicker, an animated CTA) and a DETAILED
            ANIMATED menu (cfg.map.node draws an ornate framed medallion via
            g2.ornateFrame with a tiny per-location vignette, a flowing animated
            connector between nodes, torch flames via g2.flame, and a selection
            glow/cursor; map.title/node receive sceneT for animation). Every framed
            screen should MOVE — static screens are a fail. Also use mode7/glow/big
            sprites in gameplay. The new games/<id>-16/index.html loads the Gen-4
            script order (retro-engine -> retro-gfx2 -> saga2 -> game.js); give the
            new catalog entry a fresh 16-bit blurb; shoot its thumbnail. Do NOT
            touch the 8-bit folder. Reference pair: games/dracula-8bit (Gen 3) +
            games/dracula-castle (Gen 4) — study the latter's renderBoot + menu.
            Read the "Generations" section of CLAUDE.md first.
            This is high-care work — test the whole scene walk headless (zero
            pageerrors, every phase pacing-audited) before shipping. Otherwise build the next status:"soon"
            property in js/catalog.js (most-famous-first) as a story game.

            VARIETY IS THE JOB — fight sameness (read CLAUDE.md "Variety is the
            job" first). Before building, scan the last ~8 live catalog entries
            AND skim their game.js. Then deliberately differ on THREE axes:
            (1) CORE GENRE — pick a PRIMARY genre under-represented lately from the
            full space (action, adventure, RPG, simulation, strategy/tactics,
            sports, racing, puzzle, shooter, fighting, platformer, survival,
            horror, stealth, sandbox/open-world, tower-defense, roguelike, rhythm,
            card, board, trivia, tycoon, point-and-click), matched to the property
            AND its era; do NOT ship another dodge/steer game if recent ones were,
            and a game's sub-mechanics must span >=3 distinct genres (never five
            dodge chapters); (2) STRUCTURE — the 5-node click menu is the default,
            not the law: vary node count/arrangement or use a branching path, a
            boss-rush ladder, a board/track, a character-select, or a SINGLE
            continuous game (card game, roguelike run, platformer, tycoon) on bare
            RetroEngine when the genre wants it; (3) OPENING — vary the title
            sequence (attract-loop, cold open, comic-panel prologue, map reveal,
            character-select); quotes are optional; two games in a row must not
            open alike. Keep the story framing. Deliver
            FIVE varied, easy, faithful mini-games that hit the
            property's iconic scenes, PLUS a WILDLY UNIQUE on-property look — two games
            must look nothing alike. Keep new 8-bit (Gen 3) games PERIOD-HONEST NES:
            pick colors from the NES palette (Retro.NES / Retro.snapNES(hex)); use
            FLAT hard-edged fills + dithering for shades, NOT smooth gradients or
            soft alpha glows; chunky pixels; keep the chiptune audio. Supply: a BOLD property-specific palette (bright &
            colorful for children's tales, dark for horror, royal for myth — do NOT
            default to gold-on-black); scenery(api,scene,t); a per-chapter icon; emblem;
            and a `menu` block that re-skins the chapter-select to the property via
            menu.colors + menu.card(api,info) drawing each chapter entry as something
            thematic (parchment, folders, wooden signs, banners, map nodes, cards…).
            STRONGLY prefer a non-list LAYOUT via menu.layout — vary the actual
            arrangement, button shapes and background so games don't all feel like a
            vertical list (see the references: Dracula = scattered graveyard tombstones,
            Sherlock = a pinned corkboard with red string, Robin Hood = zigzag archery
            targets in a bright clearing, Arthur = a radial Round Table of shields). Set custom currency/
            subtitle/bootCta/menuLabel/menuHint/menuDone/finale. ALSO theme the framed
            chapter-intro, score/result and finale screens via a `screens` color block
            (keys: win,lose,chapterLabel,name,sub,intro,quote,help,score,cur,cta,overlay)
            and a `labels` wording block (chapter,score,win,lose,cont,finale,toMenu,play)
            so they read in the property's voice and palette — NOT the default
            gold-on-black (e.g. Dracula tallies "BLOOD SPILLED" in crimson, Robin Hood a
            "PURSE WON" in Sherwood green; win/lose headers in-voice like "The night is
            held" / "Dawn finds you fallen"). Stay faithful to the
            source's era and mood; reserve CRT/terminal styling for genuinely sci-fi
            works only; never use the word "saga" in user-facing text. Mobile-first; must
            work fullscreen. Use games/dracula-castle and games/sherlock-hound as menu refs.
            ALSO theme the PAGE chrome: in the new index.html head add
            <style id="game-theme">:root{...}</style> overriding the page theme vars
            (--g-bg1,--g-bg2,--g-bar,--g-accent,--g-title,--g-panel,--g-border,--g-text,
            --g-key,--g-stage,--g-glow, defined in css/game.css) so the top bar, help
            strip and page background match the game's palette — not the default neon.

            PACING (critical — every chapter must be PLAYABLE): no chapter may end
            (win OR lose) before the player has had real time to actually play it.
            A survive/dodge/distance/defend chapter should last ~15-30 seconds of
            play; a timing/precision beat should still give several attempts. Audit
            the win AND lose conditions of every chapter you write: a distance or
            timer that completes in 2-5 seconds is a BUG (e.g. the old Hispaniola
            crossed its distance in ~2.4s). When a chapter advances by accumulating
            a value each frame (dist += speed*f) toward a target, remember that runs
            at ~60fps, so tune the accrual so the target is reached in ~15-25s — and
            note that obstacle fall-speed and spawn cadence are REAL-TIME (keyed off
            dt), so slowing the forward accrual gives dodging time WITHOUT changing
            difficulty. Verify in the headless test by advancing sim time and
            asserting no chapter auto-resolves in under ~8s of play.
            ALSO, as a rolling quality pass, if you have turns to spare after
            shipping the new game, quickly audit ONE previously-built game's chapter
            pacing the same way and fix any too-fast chapter you find (commit it with
            the build).

            Then: run `node --check` on every JS file; load-test headless with Playwright
            (zero pageerrors; the menu and each chapter must render); capture the
            thumbnail with `node tools/snap-thumbs.mjs <id>` (Playwright + Chromium are
            already installed in this runner, so it works without any symlink); flip that
            catalog entry's status to "live"; and PREPEND one short, friendly entry
            to the CHANGELOG array in js/changelog.js (an ES module) in the shared
            polecat format: { v: <one more than the current top entry's v>, title:
            "...", kind: "game", ts: "", items: ["...", "..."] }. Use kind "game"
            for a new/promoted game, "feature" for enhancements, "fix" for bug
            fixes. LEAVE ts EMPTY ("") — the workflow stamps the commit time
            (LATEST_VERSION is derived). Do NOT hand-write a date. Keep 1-3
            friendly `items` strings.

            Finally, commit everything with a clear message. DO NOT run `git push` —
            the workflow pushes for you.
          claude_args: |
            --max-turns 120
            --model claude-sonnet-4-6
            --dangerously-skip-permissions

      - name: Push changes
        if: success()
        run: |
          node tools/stamp-changelog.mjs || echo "no changelog to stamp"
          git add -A
          git commit -m "Hourly build — $(TZ=America/Chicago date '+%b %-d %-I:%M %p CT')" || echo "Nothing new to commit"
          git push origin main || echo "Nothing to push"
