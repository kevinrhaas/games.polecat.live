<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="games.polecat.live polecat mascot">
  <defs>
    <linearGradient id="pcBadge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241052"/>
      <stop offset="1" stop-color="#0b0420"/>
    </linearGradient>
    <linearGradient id="pcFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3d6"/>
      <stop offset="1" stop-color="#e8c79a"/>
    </linearGradient>
  </defs>
  <!-- arcade badge -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#pcBadge)" stroke="#21e6ff" stroke-width="2"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="#ff2e97" stroke-width="2" opacity="0.35"/>

  <!-- ears -->
  <path d="M14 22 L20 10 L27 20 Z" fill="#3a2a4a"/>
  <path d="M50 22 L44 10 L37 20 Z" fill="#3a2a4a"/>
  <path d="M16 21 L20 14 L24 20 Z" fill="#ff8ab8"/>
  <path d="M48 21 L44 14 L40 20 Z" fill="#ff8ab8"/>

  <!-- head -->
  <path d="M14 26 Q14 16 32 16 Q50 16 50 26 L50 38 Q50 50 32 52 Q14 50 14 38 Z" fill="url(#pcFace)"/>

  <!-- bandit mask (polecat signature) -->
  <path d="M14 28 Q14 22 22 23 L42 23 Q50 22 50 28 L50 34 Q42 33 32 33 Q22 33 14 34 Z" fill="#241038"/>
  <!-- mask glow edge -->
  <path d="M14 28 Q14 22 22 23 L42 23 Q50 22 50 28" fill="none" stroke="#9b5cff" stroke-width="1.2" opacity="0.8"/>

  <!-- eyes -->
  <circle cx="24" cy="28" r="3.4" fill="#0b0420"/>
  <circle cx="40" cy="28" r="3.4" fill="#0b0420"/>
  <circle cx="25.2" cy="26.8" r="1.1" fill="#21e6ff"/>
  <circle cx="41.2" cy="26.8" r="1.1" fill="#21e6ff"/>

  <!-- snout + nose -->
  <path d="M27 40 Q32 44 37 40 Q34 47 32 47 Q30 47 27 40 Z" fill="#f6e2bf"/>
  <path d="M29 38 L35 38 L32 42 Z" fill="#ff2e97"/>
  <!-- whisker dots -->
  <circle cx="26" cy="42" r="0.8" fill="#b59a6e"/>
  <circle cx="38" cy="42" r="0.8" fill="#b59a6e"/>

  <!-- little pixel "play" emblem on forehead -->
  <path d="M30 18.5 L34 20.5 L30 22.5 Z" fill="#ffe14d"/>
</svg>
